<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狂牛體能 — 專業教練</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#1f3d46;
    --teal-dark:#152a31;
    --gold:#d9b25a;
    --gold-bright:#e6c878;
    --bg:#e8e6e1;
    --card:#f1eee9;
    --text:#3a3a3a;
    --muted:#6b6b6b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}
  body{padding:32px 16px}

  .page-head{text-align:center;margin-bottom:36px}
  .page-head h1{font-size:30px;letter-spacing:6px;color:var(--teal);font-weight:700}
  .page-head p{font-family:"Montserrat",sans-serif;font-size:13px;letter-spacing:3px;color:var(--muted);margin-top:6px}

  .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:28px;
    max-width:700px;
    margin:0 auto;
  }

  .card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,.08);
    display:flex;
    flex-direction:column;
  }

  .card-main{
    display:grid;
    grid-template-columns:45% 55%;
    flex:1;
  }

  /* Left: photo + stats */
  .left{display:flex;flex-direction:column;background:var(--teal-dark)}
  .photo{
    flex:1;
    background-size:cover;
    background-position:center top;
    background-color:#222;
    min-height:340px;
  }
  .stats-wrap{
    background:#4a4a4a;
    color:#fff;
    padding:14px 12px 16px;
    text-align:center;
  }
  .stats-title{
    font-size:13px;
    letter-spacing:3px;
    color:#fff;
    margin-bottom:10px;
    font-weight:500;
  }
  .stats{display:flex;gap:8px;justify-content:center}
  .stat{
    background:#3a3a3a;
    border-radius:6px;
    padding:8px 6px 10px;
    flex:1;
    min-width:0;
  }
  .stat-label{font-size:11px;color:#cfcfcf;margin-bottom:3px;letter-spacing:1px}
  .stat-num{
    font-family:"Montserrat",sans-serif;
    font-size:24px;
    font-weight:600;
    color:var(--gold-bright);
    line-height:1;
  }
  .stat-unit{
    font-size:10px;
    color:var(--gold);
    margin-left:1px;
    font-family:"Montserrat",sans-serif;
  }

  /* Right: name banner + body */
  .right{display:flex;flex-direction:column}
  .name-banner{
    background:var(--teal);
    color:#fff;
    padding:22px 22px 20px;
    text-align:right;
  }
  .name-zh{font-size:26px;font-weight:700;letter-spacing:4px;line-height:1}
  .name-en{
    font-family:"Montserrat",sans-serif;
    font-size:16px;
    font-weight:300;
    letter-spacing:3px;
    color:#cfd9dc;
    margin-top:4px;
  }

  .body{padding:18px 22px 20px;flex:1;display:flex;flex-direction:column;gap:14px}
  .section h3{
    font-size:14px;
    font-weight:700;
    color:var(--teal);
    margin-bottom:6px;
    letter-spacing:1px;
    border-left:3px solid var(--gold);
    padding-left:8px;
  }
  .section ul{list-style:none;font-size:13px;line-height:1.75;color:var(--text);padding-left:2px}
  .section li{position:relative;padding-left:14px}
  .section li::before{
    content:"•";
    color:var(--gold);
    position:absolute;left:2px;top:-1px;
    font-weight:700;
  }
  .competition{font-size:13px;color:#a06a26;line-height:1.7;padding-left:2px}
  .competition::before{content:"🏅 ";}

  /* Bottom CTA */
  .cta{
    display:block;
    background:var(--teal);
    color:#fff;
    text-align:center;
    text-decoration:none;
    padding:16px;
    font-size:16px;
    letter-spacing:3px;
    font-weight:500;
    transition:background .2s;
  }
  .cta:hover{background:var(--teal-dark);color:var(--gold-bright)}

  @media (max-width:520px){
    .grid{grid-template-columns:1fr;gap:20px}
    .card-main{grid-template-columns:1fr}
    .photo{min-height:380px}
    .name-banner{text-align:left}
    .stat-num{font-size:22px}
  }
</style>
</head>
<body>

<div class="page-head">
  <h1>專 業 教 練</h1>
  <p>PROFESSIONAL COACHES</p>
</div>

<div class="grid" id="grid"></div>

<script>
const COACHES = [
  {
    en:"Victor", zh:"陳為達", photo:"photos/Victor_norm.jpg",
    specialties:["NKT神經動能檢測","專項舉重訓練","失能關節動作控制與矯正","軟組織損傷之後期照護與運動矯正"],
    certs:["台灣運動傷害防護學會─運動防護員(AT)","IHFI─PFT(私人教練)","IHFI─BET(護脊運動教練)","NKT神經動能療法 Lv.2"],
    stats:[["抱槓蹲舉",150],["臥舉",125],["硬舉",220]]
  },
  {
    en:"Apo", zh:"吳宜鴻", photo:"photos/Apo_norm.jpg",
    specialties:["NKT神經動能檢測","膳食營養評估與建議(減重/減脂)","關節/脊椎排列與矯正運動","運動按摩"],
    certs:["怪獸訓練─C級肌力與體能教練","狂牛體能教練系統"],
    stats:[["蹲舉",165],["臥舉",100],["硬舉",200]]
  },
  {
    en:"Morgan", zh:"許晉華", photo:"photos/Morgan_norm.jpg",
    specialties:["NKT神經動能檢測","專項健力訓練","功能性訓練(日常生活動作提升與改善)","螺旋肌力與地雷管訓練","運動按摩"],
    certs:["螺旋肌力體能訓練專家","TSMA─BAK(解剖肌肉動力學)","狂牛體能教練系統"],
    competition:"新極真空手道靜岡縣大賽第四名",
    stats:[["蹲舉",150],["臥舉",100],["硬舉",200]]
  },
  {
    en:"Adam", zh:"楊奇", photo:"photos/Adam_norm.jpg",
    specialties:["動作效益訓練","肌力與體能訓練","壺鈴訓練","懸吊訓練"],
    certs:["IHFI─PFT(私人教練)","AFAA─WT(器材訓練指導)","TRX─STC(懸吊訓練教練)","CFSC─功能性訓練教練認證","CrossFit Trainer Lv.1 指導員"],
    stats:[["蹲舉",200],["臥舉",120],["硬舉",220]]
  },
  {
    en:"Rick", zh:"許為竣", photo:"photos/Rick_norm.jpg",
    specialties:["NKT神經動能檢測","泰拳格鬥","拳擊格鬥","格鬥專項體能訓練","極限燃脂間歇訓練","高效身體線條重塑"],
    certs:["狂牛體能教練系統"],
    stats:[["抱槓蹲舉",110],["臥舉",105],["硬舉",160]]
  },
  {
    en:"Verna", zh:"蔡語瑄", photo:"photos/Verna_norm.jpg",
    specialties:["NKT神經動能檢測","入門基礎肌力建構","女性專屬體態雕塑","臀部肌群動作優化","產後雕塑與恢復訓練"],
    certs:["狂牛體能教練系統","ACE─CPT"],
    stats:[["蹲舉",90],["臥舉",50],["硬舉",100]]
  }
];

const BOOKING_BASE = "https://weida6610.github.io/rbtc-schedule";

const grid = document.getElementById("grid");
COACHES.forEach(c => {
  const stats = c.stats.map(([l,n]) =>
    `<div class="stat"><div class="stat-label">${l}</div><div class="stat-num">${n}<span class="stat-unit">KG</span></div></div>`
  ).join("");
  const specs = c.specialties.map(s => `<li>${s}</li>`).join("");
  const certs = c.certs.map(s => `<li>${s}</li>`).join("");
  const comp = c.competition
    ? `<div class="section"><h3>比賽經歷</h3><div class="competition">${c.competition}</div></div>`
    : "";
  grid.insertAdjacentHTML("beforeend", `
    <article class="card">
      <div class="card-main">
        <div class="left">
          <div class="photo" style="background-image:url('${c.photo}')"></div>
          <div class="stats-wrap">
            <div class="stats-title">運 動 能 力 指 標</div>
            <div class="stats">${stats}</div>
          </div>
        </div>
        <div class="right">
          <div class="name-banner">
            <div class="name-zh">${c.zh}</div>
            <div class="name-en">${c.en}</div>
          </div>
          <div class="body">
            <div class="section"><h3>專業項目</h3><ul>${specs}</ul></div>
            <div class="section"><h3>證照執照</h3><ul>${certs}</ul></div>
            ${comp}
          </div>
        </div>
      </div>
      <a class="cta" href="${BOOKING_BASE}?coach=${c.en}" target="_blank" rel="noopener">預 約 ${c.en} 教 練</a>
    </article>
  `);
});

/* Notify Wix parent of actual content height */
function notifyHeight(){
  const h = document.documentElement.scrollHeight;
  window.parent.postMessage({type:'setHeight', height:h}, '*');
}
window.addEventListener('load', notifyHeight);
window.addEventListener('resize', notifyHeight);
/* Re-send after background images finish loading */
document.querySelectorAll('.photo').forEach(el => {
  const src = el.style.backgroundImage.replace(/url\(['"]?|['"]?\)/g,'');
  if(src){ const img=new Image(); img.onload=notifyHeight; img.src=src; }
});
/* Safety: re-send after 1s in case of late rendering */
setTimeout(notifyHeight, 1000);
</script>
</body>
</html>
